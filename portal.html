<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BETRANK TOURS — 管理ポータル</title>
<style>
  :root{--primary:#1a1a2e;--secondary:#16213e;--accent:#e94560;--gold:#f5a623;--green:#27ae60;--blue:#3498db;--text:#ecf0f1;--muted:#95a5a6;--card:#1e2a3a;--border:#2c3e50;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Segoe UI','Meiryo',sans-serif;background:var(--primary);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

  /* Top bar */
  .top-bar{
    background:linear-gradient(135deg,#0a0a1a,var(--secondary));
    padding:10px 20px;border-bottom:2px solid var(--accent);
    display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
    position:relative;
  }
  .top-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--gold),var(--accent));}
  .top-bar h1{color:var(--gold);font-size:1.2em;letter-spacing:1px;}
  .top-bar .date{color:var(--muted);font-size:0.8em;}

  /* Main layout */
  .main{display:flex;flex:1;overflow:hidden;}

  /* Sidebar */
  .sidebar{
    width:220px;background:var(--secondary);border-right:1px solid var(--border);
    overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;
  }
  .sidebar-section{padding:12px 14px 4px;color:var(--muted);font-size:0.7em;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
  .sidebar-item{
    display:flex;align-items:center;gap:10px;padding:10px 14px;
    cursor:pointer;transition:all 0.15s;border-left:3px solid transparent;
    text-decoration:none;color:var(--text);font-size:0.85em;
  }
  .sidebar-item:hover{background:rgba(255,255,255,0.05);border-left-color:var(--border);}
  .sidebar-item.active{background:rgba(245,166,35,0.1);border-left-color:var(--gold);color:var(--gold);}
  .sidebar-item .icon{font-size:1.2em;width:24px;text-align:center;}
  .sidebar-item .label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sidebar-item .ext{font-size:0.65em;color:var(--muted);margin-left:auto;}

  /* Content area */
  .content{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .content-header{
    background:var(--card);padding:8px 16px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:12px;flex-shrink:0;
  }
  .content-header .title{color:var(--gold);font-weight:700;font-size:0.95em;}
  .content-header .url{color:var(--muted);font-size:0.75em;flex:1;}
  .content-header button{
    background:var(--secondary);border:1px solid var(--border);color:var(--muted);
    padding:4px 12px;border-radius:6px;cursor:pointer;font-size:0.75em;
  }
  .content-header button:hover{border-color:var(--gold);color:var(--gold);}
  .content-frame{flex:1;}
  .content-frame iframe{width:100%;height:100%;border:none;background:#fff;}

  /* Welcome screen */
  .welcome{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px;
  }
  .welcome h2{color:var(--gold);font-size:1.8em;margin-bottom:8px;}
  .welcome p{color:var(--muted);font-size:0.95em;margin-bottom:30px;}
  .welcome-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;max-width:700px;width:100%;}
  .welcome-card{
    background:var(--card);border:1px solid var(--border);border-radius:10px;
    padding:16px;cursor:pointer;transition:all 0.15s;text-align:center;
  }
  .welcome-card:hover{border-color:var(--gold);transform:translateY(-2px);}
  .welcome-card .wicon{font-size:1.8em;margin-bottom:6px;}
  .welcome-card .wlabel{color:var(--gold);font-size:0.85em;font-weight:600;}

  /* Mobile */
  @media(max-width:768px){
    .sidebar{width:56px;}
    .sidebar-section{display:none;}
    .sidebar-item .label,.sidebar-item .ext{display:none;}
    .sidebar-item{justify-content:center;padding:12px 0;}
    .sidebar-item .icon{width:auto;}
  }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <h1>BETRANK TOURS</h1>
  <span class="date" id="currentDate"></span>
</div>

<!-- Main -->
<div class="main">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">営業・管理</div>
    <div class="sidebar-item active" onclick="loadTool('index.html','CRM — 顧客管理',this)">
      <span class="icon">👥</span><span class="label">CRM</span>
    </div>
    <div class="sidebar-item" onclick="loadTool('telebet-incentive.html','テレベット営業インセンティブ',this)">
      <span class="icon">📱</span><span class="label">テレベット歩合</span>
    </div>
    <div class="sidebar-item" onclick="loadTool('exchange.html','換金ツール',this)">
      <span class="icon">💱</span><span class="label">換金</span>
    </div>

    <div class="sidebar-section">アンケート</div>
    <div class="sidebar-item" onclick="loadTool('survey.html','VIP体験アンケート',this)">
      <span class="icon">📋</span><span class="label">アンケート</span>
    </div>
    <div class="sidebar-item" onclick="loadTool('survey-results.html','アンケート結果',this)">
      <span class="icon">📈</span><span class="label">結果ダッシュボード</span>
    </div>

    <div class="sidebar-section">外部システム</div>
    <div class="sidebar-item" onclick="loadExternal('https://betrnk-fund.vercel.app','資金管理表',this)">
      <span class="icon">🏦</span><span class="label">資金管理</span><span class="ext">↗</span>
    </div>
    <div class="sidebar-item" onclick="loadExternal('https://casino-report-system-production.up.railway.app','カジノレポート',this)">
      <span class="icon">🎰</span><span class="label">カジノレポート</span><span class="ext">↗</span>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="contentArea">
    <div class="welcome" id="welcomeScreen">
      <h2>管理ポータル</h2>
      <p>左のメニューからツールを選択、またはクイックアクセス</p>
      <div class="welcome-grid">
        <div class="welcome-card" onclick="document.querySelectorAll('.sidebar-item')[0].click()">
          <div class="wicon">👥</div><div class="wlabel">CRM</div>
        </div>
        <div class="welcome-card" onclick="document.querySelectorAll('.sidebar-item')[1].click()">
          <div class="wicon">📱</div><div class="wlabel">テレベット歩合</div>
        </div>
        <div class="welcome-card" onclick="document.querySelectorAll('.sidebar-item')[5].click()">
          <div class="wicon">🏦</div><div class="wlabel">資金管理</div>
        </div>
        <div class="welcome-card" onclick="document.querySelectorAll('.sidebar-item')[6].click()">
          <div class="wicon">🎰</div><div class="wlabel">カジノレポート</div>
        </div>
        <div class="welcome-card" onclick="document.querySelectorAll('.sidebar-item')[3].click()">
          <div class="wicon">📋</div><div class="wlabel">アンケート</div>
        </div>
        <div class="welcome-card" onclick="document.querySelectorAll('.sidebar-item')[2].click()">
          <div class="wicon">💱</div><div class="wlabel">換金</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const d=new Date();
const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
document.getElementById('currentDate').textContent=d.getFullYear()+'年'+months[d.getMonth()]+d.getDate()+'日';

function setActive(el){
  document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
}

function loadTool(url,title,el){
  setActive(el);
  document.getElementById('contentArea').innerHTML=`
    <div class="content-header">
      <span class="title">${title}</span>
      <span class="url">${url}</span>
      <button onclick="window.open('${url}','_blank')">別タブで開く</button>
    </div>
    <div class="content-frame">
      <iframe src="${url}"></iframe>
    </div>`;
}

function loadExternal(url,title,el){
  setActive(el);
  document.getElementById('contentArea').innerHTML=`
    <div class="content-header">
      <span class="title">${title}</span>
      <span class="url">${url}</span>
      <button onclick="window.open('${url}','_blank')">別タブで開く</button>
    </div>
    <div class="content-frame">
      <iframe src="${url}"></iframe>
    </div>`;
}
</script>
</body>
</html>
